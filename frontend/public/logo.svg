<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 36" fill="none">
  <!-- Purple pill background -->
  <rect width="140" height="36" rx="10" fill="#714B67"/>

  <!-- Fork (left utensil) -->
  <!-- Tine 1 -->
  <line x1="18" y1="7" x2="18" y2="15" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Tine 2 -->
  <line x1="22" y1="7" x2="22" y2="15" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Tine 3 -->
  <line x1="26" y1="7" x2="26" y2="15" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Arch connecting tines -->
  <path d="M18 15 Q22 19 26 15" stroke="white" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <!-- Handle -->
  <line x1="22" y1="18" x2="22" y2="29" stroke="white" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Knife (right utensil) -->
  <!-- Blade -->
  <path d="M32 7 C32 7 36 11 36 17 L32 18 Z" fill="white"/>
  <!-- Handle -->
  <line x1="32" y1="18" x2="32" y2="29" stroke="white" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Brand text -->
  <text x="46" y="23" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="700" font-size="14" fill="white" letter-spacing="0.4">Resto</text>
  <text x="90" y="23" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="400" font-size="14" fill="rgba(255,255,255,0.72)" letter-spacing="0.4">POS</text>
</svg>
